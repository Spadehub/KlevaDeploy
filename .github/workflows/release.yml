name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
      - prereleased
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (example: v0.1.0-beta.2)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    concurrency:
      group: release-${{ github.event.release.tag_name || github.ref_name || github.event.inputs.tag || github.run_id }}
      cancel-in-progress: false
    steps:
      - name: Resolve Tag
        id: tag
        shell: pwsh
        run: |
          $tag = ""
          if ("${{ github.event_name }}" -eq "release") {
            $tag = "${{ github.event.release.tag_name }}"
          } elseif ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $tag = "${env:GITHUB_REF_NAME}"
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Unable to determine release tag."
          }

          "value=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.tag.outputs.value }}
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Parse Version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.value }}"
          $v = $tag.TrimStart('v','V')
          $prefix = $v
          $suffix = ""
          if ($v.Contains("-")) {
            $split = $v.Split("-", 2)
            $prefix = $split[0]
            $suffix = $split[1]
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prefix=$prefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "suffix=$suffix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: dotnet restore .\KlevaDeploy.sln

      - name: Build Tests
        run: dotnet build .\KlevaDeploy.Tests\KlevaDeploy.Tests.csproj -c Release -p:UseAppHost=false

      - name: Run Tests
        run: dotnet test .\KlevaDeploy.Tests\KlevaDeploy.Tests.csproj -c Release --no-build

      - name: Publish
        shell: pwsh
        run: |
          $prefix = "${{ steps.ver.outputs.prefix }}"
          $suffix = "${{ steps.ver.outputs.suffix }}"
          $args = @(
            "publish", ".\KlevaDeploy.csproj",
            "-c", "Release",
            "-r", "win-x64",
            "--self-contained", "true",
            "/p:PublishSingleFile=true",
            "/p:IncludeNativeLibrariesForSelfExtract=true",
            "/p:VersionPrefix=$prefix"
          )
          if (![string]::IsNullOrWhiteSpace($suffix)) {
            $args += "/p:VersionSuffix=$suffix"
          } else {
            $args += "/p:VersionSuffix="
          }
          dotnet @args

      - name: Package Release Assets
        shell: pwsh
        run: |
          $publishDir = "bin\\Release\\net8.0-windows\\win-x64\\publish"
          $exe = Join-Path $publishDir "KlevaDeploy.exe"
          $zip = Join-Path $publishDir "KlevaDeploy-win-x64.zip"
          if (!(Test-Path $exe)) { throw "Publish output not found: $exe" }
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path (Join-Path $publishDir "*") -DestinationPath $zip -Force

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KlevaDeploy-${{ steps.tag.outputs.value }}-win-x64
          path: |
            bin\Release\net8.0-windows\win-x64\publish\KlevaDeploy.exe
            bin\Release\net8.0-windows\win-x64\publish\KlevaDeploy-win-x64.zip

      - name: Create Or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          prerelease: ${{ steps.ver.outputs.suffix != '' }}
          fail_on_unmatched_files: true
          append_body: false
          make_latest: ${{ steps.ver.outputs.suffix == '' }}
          files: |
            bin\Release\net8.0-windows\win-x64\publish\KlevaDeploy.exe
            bin\Release\net8.0-windows\win-x64\publish\KlevaDeploy-win-x64.zip
